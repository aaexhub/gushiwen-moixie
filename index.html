// ====== LocalStorage ======
function load(k,d){try{const v=localStorage.getItem('gsw_'+k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){localStorage.setItem('gsw_'+k,JSON.stringify(v))}

function getState(){return load('state',{totalQ:0,totalCorrect:0,days:{},wrongIds:[],lastDate:null,streak:0})}
function setState(s){save('state',s)}

function todayKey(){return new Date().toISOString().slice(0,10)}

// ====== 每日出题 ======
function getDailyQIds(){
  const s=getState(), tk=todayKey();
  if(s.days[tk]) return s.days[tk]; // 今天已出过题
  
  // 获取昨天的错题
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.toISOString().slice(0,10);
  const yesterdayWrongIds=s.wrongIds||[];
  
  // 计算已做过的题目
  const done=new Set();
  Object.values(s.days).forEach(ids=>ids.forEach(id=>done.add(id)));
  
  // 优先选择昨天的错题（最多3题）
  let selectedIds=[];
  const wrongPool=yesterdayWrongIds.filter(id=>!done.has(id));
  const wrongCount=Math.min(3,wrongPool.length);
  if(wrongCount>0){
    selectedIds=wrongPool.slice(0,wrongCount);
  }
  
  // 从剩余题库中随机选择题目补足10题
  let pool=ALL_QUESTIONS.filter(q=>!done.has(q.id) && !selectedIds.includes(q.id));
  if(pool.length<(10-selectedIds.length)) pool=ALL_QUESTIONS.filter(q=>!selectedIds.includes(q.id));
  
  // 随机选择剩余题目
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  const remainingIds=pool.slice(0,10-selectedIds.length).map(q=>q.id);
  
  // 合并题目ID
  const ids=[...selectedIds,...remainingIds];
  
  // 保存今天的题目
  s.days[tk]=ids;
  
  // 更新连续天数
  s.streak=s.days[yk]?(s.streak||0)+1:1;
  s.lastDate=tk;
  setState(s);
  
  return ids;
}

function addQuestions(newQs){
  const existing=new Set(ALL_QUESTIONS.map(q=>q.id));
  newQs.forEach(q=>{if(!existing.has(q.id))ALL_QUESTIONS.push(q)});
}

// ====== 渲染 ======
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab:${tab==='daily'?'first':'last'}-child`).classList.add('active');
  document.getElementById('dailyPanel').style.display=tab==='daily'?'block':'none';
  document.getElementById('wrongPanel').style.display=tab==='wrong'?'block':'none';
  if(tab==='daily')startDaily(); else startWrong();
}

function renderQuiz(qs,areaId){
  const area=document.getElementById(areaId);
  area.innerHTML='';
  qs.forEach((q,qi)=>{
    let html=`<div class="card" id="card_${areaId}_${qi}"><span class="q-num">${qi+1}</span>`;
    let bi=0;
    q.lines.forEach(line=>{
      let l=line;
      while(l.includes('____')){
        l=l.replace('____',`<input type="text" data-qi="${qi}" data-bi="${bi}" data-area="${areaId}" class="blank-input" autocomplete="off">`);
        bi++;
      }
      html+=`<div class="line">${l}</div>`;
    });
    html+=`<div class="source">${q.sources.join('；')}</div>`;
    html+=`<div class="answer-reveal" id="reveal_${areaId}_${qi}"></div></div>`;
    area.innerHTML+=html;
  });
  area.querySelectorAll('.blank-input').forEach(inp=>{
    inp.addEventListener('input',()=>updateProgress(areaId,qs));
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();const all=[...area.querySelectorAll('.blank-input')];const idx=all.indexOf(e.target);if(idx<all.length-1)all[idx+1].focus()}
    });
  });
  submitted=false;
  startTimer();
}

function updateProgress(areaId,qs){
  const inputs=document.querySelectorAll(`#${areaId} .blank-input`);
  let filled=0;inputs.forEach(i=>{if(i.value.trim())filled++});
  const total=qs.reduce((s,q)=>s+q.bc,0);
  if(areaId==='quizArea'){
    document.getElementById('progressFill').style.width=(filled/total*100)+'%';
    document.getElementById('answeredCount').textContent=`已答 ${filled}/${total}`;
  }
}

function startTimer(){
  seconds=0;clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    seconds++;
    const m=String(Math.floor(seconds/60)).padStart(2,'0');
    const s=String(seconds%60).padStart(2,'0');
    document.getElementById('timerDisplay').textContent=`⏱ ${m}:${s}`;
  },1000);
}

function submitAll(mode){
  if(submitted)return;
  submitted=true;clearInterval(timerInterval);
  const areaId=mode==='daily'?'quizArea':'wrongArea';
  const resultId=mode==='daily'?'dailyResult':'wrongResult';
  const scoreId=mode==='daily'?'dailyScore':'wrongScore';
  const detailId=mode==='daily'?'dailyDetail':'wrongDetail';
  let correct=0,total=0,wrongQIds=[];
  currentQuestions.forEach((q,qi)=>{
    const card=document.getElementById(`card_${areaId}_${qi}`);
    const reveal=document.getElementById(`reveal_${areaId}_${qi}`);
    let qOk=true,revealHtml='<b>正确答案：</b>';
    q.answers.forEach((a,bi)=>{
      const inp=document.querySelector(`input[data-qi="${qi}"][data-bi="${bi}"][data-area="${areaId}"]`);
      const val=inp.value.replace(/[\s，。、；：！？,.]/g,'');
      const ans=a.replace(/[\s，。、；：！？,.]/g,'');
      total++;
      if(val===ans){inp.classList.add('correct-input');correct++}
      else{inp.classList.add('wrong-input');if(!inp.value.trim())inp.value='(未作答)';qOk=false}
      // 添加带拼音的答案
      const pinyinAnswer=addPinyinToText(a);
      revealHtml+=` <span style="color:#2d7d2d">${pinyinAnswer}</span>`;
    });
    card.classList.add(qOk?'correct':'wrong');
    if(!qOk){reveal.style.display='block';reveal.innerHTML=revealHtml;wrongQIds.push(q.id)}
  });
  document.querySelectorAll(`#${areaId} .blank-input`).forEach(i=>i.disabled=true);
  // 更新统计
  const st=getState();
  st.totalQ+=total;st.totalCorrect+=correct;
  // 更新错题库：本次错的加入，本次对的从错题库移除
  const curIds=currentQuestions.map(q=>q.id);
  wrongQIds.forEach(id=>{if(!st.wrongIds.includes(id))st.wrongIds.push(id)});
  curIds.forEach(id=>{if(!wrongQIds.includes(id)){st.wrongIds=st.wrongIds.filter(w=>w!==id)}});
  setState(st);
  // 显示结果
  const score=Math.round(correct/total*100);
  document.getElementById(scoreId).textContent=score;
  document.getElementById(detailId).innerHTML=`共${total}空，答对${correct}空，答错${total-correct}空<br>用时 ${Math.floor(seconds/60)}分${seconds%60}秒`;
  document.getElementById(resultId).style.display='block';
  updateStats();updateWrongBadge();
}

function redoDaily(){
  const st=getState(),tk=todayKey();
  delete st.days[tk];
  setState(st);
  document.getElementById('dailyResult').style.display='none';
  startDaily();
}

function startDaily(){
  document.getElementById('dailyResult').style.display='none';
  const ids=getDailyQIds();
  currentQuestions=ids.map(id=>ALL_QUESTIONS.find(q=>q.id===id));
  document.getElementById('dayInfo').textContent=`📅 ${todayKey()} · 第${Object.keys(getState().days).length}天`;
  renderQuiz(currentQuestions,'quizArea');
  updateStats();
}

function startWrong(){
  document.getElementById('wrongResult').style.display='none';
  const st=getState();
  currentQuestions=st.wrongIds.map(id=>ALL_QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  if(currentQuestions.length===0){
    document.getElementById('wrongArea').innerHTML='<div class="empty-msg">🎉 错题库为空，继续保持！</div>';
    document.getElementById('wrongBtns').style.display='none';
    return;
  }
  document.getElementById('wrongBtns').style.display='block';
  renderQuiz(currentQuestions,'wrongArea');
}

function clearWrong(){
  if(!confirm('确定清空错题库？'))return;
  const st=getState();st.wrongIds=[];setState(st);
  updateWrongBadge();startWrong();
}

function updateStats(){
  const st=getState();
  // 计算已做过的唯一题目数量
  const doneSet=new Set();
  Object.values(st.days).forEach(ids=>ids.forEach(id=>doneSet.add(id)));
  const doneCount=doneSet.size;
  
  document.getElementById('statTotalQuestions').textContent=`总题数 151`;
  document.getElementById('statDone').textContent=`已做 ${doneCount} 题`;
  document.getElementById('statCorrect').textContent=st.totalQ?`正确率 ${Math.round(st.totalCorrect/st.totalQ*100)}%`:'正确率 --';
  document.getElementById('statStreak').textContent=`🔥 连续 ${st.streak||0} 天`;
}

function updateWrongBadge(){
  const n=getState().wrongIds.length;
  const badge=document.getElementById('wrongBadge');
  if(n>0){badge.style.display='inline';badge.textContent=n}else{badge.style.display='none'}
}

// 初始化
startDaily();updateWrongBadge();
</script>
