<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古诗文默写系统 · 智能版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","SimSun",serif;background:linear-gradient(135deg,#f5f0e8 0%,#e8e0d0 100%);min-height:100vh;color:#3a2e1f}
.container{max-width:700px;margin:0 auto;padding:15px}
h1{text-align:center;font-size:1.5em;color:#6b3a2a;margin:15px 0 5px;letter-spacing:4px}
.subtitle{text-align:center;color:#9a8060;font-size:0.85em;margin-bottom:15px}
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
.tab{padding:8px 22px;border-radius:20px;font-size:0.9em;cursor:pointer;border:2px solid #d4c4aa;background:#fffef9;color:#6b3a2a;transition:all .2s;font-family:inherit}
.tab.active{background:linear-gradient(135deg,#8b5e3c,#a67c52);color:#fff;border-color:#8b5e3c}
.tab .badge{display:inline-block;background:#e06050;color:#fff;border-radius:10px;font-size:0.7em;padding:1px 6px;margin-left:4px;min-width:16px;text-align:center}
.progress-bar{background:#e0d5c5;border-radius:10px;height:8px;margin-bottom:15px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#8b5e3c,#c49a6c);height:100%;border-radius:10px;transition:width .4s}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85em;color:#8a7560}
.card{background:#fffef9;border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(100,70,40,.08);border:1px solid #e8ddd0;transition:all .3s}
.card.correct{border-color:#6abf69;background:#f6faf6}
.card.wrong{border-color:#e06050;background:#fdf6f5}
.card.mastered{border-color:#06d6a0;background:#f0fdf9}
.card.skipped{border-color:#ffd166;background:#fffbf0}
.card .q-num{display:inline-block;background:#8b5e3c;color:#fff;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;font-size:.75em;margin-right:6px}
.card .source{color:#9a8060;font-size:.78em;margin-top:4px}
.card .line{margin:6px 0;font-size:1em;line-height:2}
.card .line input{border:none;border-bottom:2px dashed #c4a87a;background:transparent;font-size:1em;font-family:inherit;color:#3a2e1f;width:130px;padding:2px 4px;outline:none;transition:border-color .3s}
.card .line input:focus{border-color:#8b5e3c}
.card .line input.correct-input{border-color:#6abf69;color:#2d7d2d;background:#eef8ee;border-bottom-style:solid}
.card .line input.wrong-input{border-color:#e06050;color:#c03020;background:#fef0ee;border-bottom-style:solid}
.card .answer-reveal{color:#2d7d2d;font-size:.85em;margin-top:4px;display:none}
.btn-row{text-align:center;margin:20px 0}
.btn{display:inline-block;padding:10px 26px;border-radius:8px;font-size:.95em;cursor:pointer;border:none;font-family:inherit;transition:all .2s;margin:0 5px}
.btn-primary{background:linear-gradient(135deg,#8b5e3c,#a67c52);color:#fff;box-shadow:0 3px 10px rgba(100,60,30,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(100,60,30,.3)}
.btn-secondary{background:#e8ddd0;color:#6b3a2a}
.btn-secondary:hover{background:#ddd0c0}
.btn-danger{background:#e06050;color:#fff}
.result-panel{background:#fffef9;border-radius:12px;padding:22px;margin:15px 0;box-shadow:0 2px 10px rgba(100,70,40,.08);border:1px solid #e8ddd0;text-align:center;display:none}
.result-panel .big-score{font-size:2.8em;color:#8b3a2a;font-weight:bold}
.result-panel .label{color:#9a8060;font-size:.85em;margin-top:4px}
.result-panel .detail{margin-top:12px;font-size:.88em;color:#6b5a48;line-height:1.8}
.empty-msg{text-align:center;color:#9a8060;padding:40px 0;font-size:1em}
.day-info{text-align:center;color:#9a8060;font-size:.85em;margin-bottom:12px}
.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:15px;font-size:.85em;color:#8a7560}
.stats-row span{background:#fffef9;padding:4px 12px;border-radius:12px;border:1px solid #e8ddd0}
/* 拼音标注样式 */
.pinyin-char{position:relative;display:inline-block;margin:0 1px}
.pinyin{position:absolute;top:-1.2em;left:0;font-size:0.6em;color:#9a8060;width:100%;text-align:center;white-space:nowrap}
/* 按钮样式 */
.action-buttons{display:flex;gap:8px;margin-top:8px}
.btn-skip{padding:4px 12px;font-size:0.8em;background:#ffd166;color:#8a5a00;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-skip:hover{background:#ffc745}
.btn-mastered{padding:4px 12px;font-size:0.8em;background:#06d6a0;color:#005f45;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-mastered:hover{background:#05c592}
.btn-skip:disabled,.btn-mastered:disabled{opacity:0.5;cursor:not-allowed}
</style>
</head>

<body>
<div class="container">
  <h1>古诗文默写系统</h1>
  <div class="subtitle">八年级(下) · 智能版</div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('daily')">📅 每日练习</div>
    <div class="tab" onclick="switchTab('wrong')">📝 错题复习 <span class="badge" id="wrongBadge" style="display:none">0</span></div>
    <div class="tab" onclick="switchTab('mastered')">✅ 已掌握</div>
    <div class="tab" onclick="switchTab('skipped')">⏭️ 跳过题</div>
  </div>
  
  <div class="day-info" id="dayInfo"></div>
  
  <div class="stats-row">
    <span id="statTotalQuestions">总题数 151</span>
    <span id="statDone">已做 0 题</span>
    <span id="statMastered">✅ 已掌握 0 题</span>
    <span id="statSkipped">⏭️ 跳过 0 题</span>
    <span id="statCorrect">正确率 --</span>
    <span id="statStreak">🔥 连续 0 天</span>
  </div>
  
  <!-- 每日练习区域 -->
  <div id="dailyTab">
    <div class="score-bar">
      <span id="answeredCount">已答 0/0</span>
      <span id="timerDisplay">⏱ 00:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    
    <div id="quizArea"></div>
    
    <div class="btn-row" id="dailyBtns">
      <button class="btn btn-primary" onclick="submitAll('daily')">📤 提交答案</button>
      <button class="btn btn-secondary" onclick="redoDaily()">🔄 重新练习</button>
    </div>
    
    <div class="result-panel" id="dailyResult">
      <div class="big-score" id="dailyScore">100</div>
      <div class="label">今日得分</div>
      <div class="detail" id="dailyDetail"></div>
    </div>
  </div>
  
  <!-- 错题复习区域 -->
  <div id="wrongTab" style="display:none">
    <div id="wrongArea"></div>
    <div class="btn-row" id="wrongBtns">
      <button class="btn btn-primary" onclick="submitAll('wrong')">📤 提交答案</button>
      <button class="btn btn-danger" onclick="clearWrong()">🗑️ 清空错题</button>
    </div>
    <div class="result-panel" id="wrongResult">
      <div class="big-score" id="wrongScore">100</div>
      <div class="label">错题练习得分</div>
      <div class="detail" id="wrongDetail"></div>
    </div>
  </div>
  
  <!-- 已掌握题目区域 -->
  <div id="masteredTab" style="display:none">
    <div id="masteredArea"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reviewMastered()">🔄 复习已掌握</button>
      <button class="btn btn-danger" onclick="clearMastered()">🗑️ 清空已掌握</button>
    </div>
  </div>
  
  <!-- 跳过题目区域 -->
  <div id="skippedTab" style="display:none">
    <div id="skippedArea"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="trySkipped()">📝 尝试跳过题</button>
      <button class="btn btn-danger" onclick="clearSkipped()">🗑️ 清空跳过题</button>
    </div>
  </div>
</div>

<script>

  // 11-20题：柳宗元《小石潭记》
  {id:11,lines:["____，闻水声。"],sources:["柳宗元《小石潭记》"],answers:["从小丘西行百二十步"],bc:1},

  {id:16,lines:["____，蒙络摇缀。"],sources:["柳宗元《小石潭记》"],answers:["青树翠蔓"],bc:1},

  {id:80,lines:["____，亦若是则已矣。"],sources:["庄子《北冥有鱼》"],answers:["其视下也"],bc:1},
  
  // 81-90题：韩愈《马说》
  {id:81,lines:["____，然后有千里马。"],sources:["韩愈《马说》"],answers:["世有伯乐"],bc:1},
  {id:82,lines:["____，而伯乐不常有。"],sources:["韩愈《马说》"],answers:["千里马常有"],bc:1},
  {id:83,lines:["____，祗辱于奴隶人之手。"],sources:["韩愈《马说》"],answers:["故虽有名马"],bc:1},
  {id:84,lines:["____，不以千里称也。"],sources:["韩愈《马说》"],answers:["故虽有名马"],bc:1},
  {id:85,lines:["____，一食或尽粟一石。"],sources:["韩愈《马说》"],answers:["马之千里者"],bc:1},
  {id:86,lines:["____，食马者不知其能千里而食也。"],sources:["韩愈《马说》"],answers:["马之千里者"],bc:1},
  {id:87,lines:["____，力不足，才美不外见。"],sources:["韩愈《马说》"],answers:["食不饱"],bc:1},
  {id:88,lines:["____，安求其能千里也？"],sources:["韩愈《马说》"],answers:["且欲与常马等不可得"],bc:1},
  {id:89,lines:["____，鸣之而不能通其意。"],sources:["韩愈《马说》"],answers:["策之不以其道"],bc:1},
  {id:90,lines:["____，执策而临之。"],sources:["韩愈《马说》"],answers:["其真无马邪"],bc:1},

  // 101-110题：补充题目
  {id:101,lines:["____，悠然见南山。"],sources:["陶渊明《饮酒》"],answers:["采菊东篱下"],bc:1},
  {id:102,lines:["____，飞鸟相与还。"],sources:["陶渊明《饮酒》"],answers:["山气日夕佳"],bc:1},

  {id:104,lines:["____，欲辨已忘言。"],sources:["陶渊明《饮酒》"],answers:["此中有真意"],bc:1},

  {id:106,lines:["____，同是宦游人。"],sources:["王勃《送杜少府之任蜀州》"],answers:["与君离别意"],bc:1},

  {id:108,lines:["____，儿女共沾巾。"],sources:["王勃《送杜少府之任蜀州》"],answers:["无为在歧路"],bc:1},
  {id:109,lines:["____，浑欲不胜簪。"],sources:["杜甫《春望》"],answers:["白头搔更短"],bc:1},
  {id:110,lines:["____，家书抵万金。"],sources:["杜甫《春望》"],answers:["烽火连三月"],bc:1},
  
  // 111-120题
  {id:111,lines:["____，恨别鸟惊心。"],sources:["杜甫《春望》"],answers:["感时花溅泪"],bc:1},
  {id:112,lines:["____，城春草木深。"],sources:["杜甫《春望》"],answers:["国破山河在"],bc:1},
