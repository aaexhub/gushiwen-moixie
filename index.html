<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古诗文默写系统 · 智能版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","SimSun",serif;background:linear-gradient(135deg,#f5f0e8 0%,#e8e0d0 100%);min-height:100vh;color:#3a2e1f}
.container{max-width:700px;margin:0 auto;padding:15px}
h1{text-align:center;font-size:1.5em;color:#6b3a2a;margin:15px 0 5px;letter-spacing:4px}
.subtitle{text-align:center;color:#9a8060;font-size:0.85em;margin-bottom:15px}
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
.tab{padding:8px 22px;border-radius:20px;font-size:0.9em;cursor:pointer;border:2px solid #d4c4aa;background:#fffef9;color:#6b3a2a;transition:all .2s;font-family:inherit}
.tab.active{background:linear-gradient(135deg,#8b5e3c,#a67c52);color:#fff;border-color:#8b5e3c}
.tab .badge{display:inline-block;background:#e06050;color:#fff;border-radius:10px;font-size:0.7em;padding:1px 6px;margin-left:4px;min-width:16px;text-align:center}
.progress-bar{background:#e0d5c5;border-radius:10px;height:8px;margin-bottom:15px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#8b5e3c,#c49a6c);height:100%;border-radius:10px;transition:width .4s}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85em;color:#8a7560}
.card{background:#fffef9;border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(100,70,40,.08);border:1px solid #e8ddd0;transition:all .3s}
.card.correct{border-color:#6abf69;background:#f6faf6}
.card.wrong{border-color:#e06050;background:#fdf6f5}
.card.mastered{border-color:#06d6a0;background:#f0fdf9}
.card.skipped{border-color:#ffd166;background:#fffbf0}
.card .q-num{display:inline-block;background:#8b5e3c;color:#fff;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;font-size:.75em;margin-right:6px}
.card .source{color:#9a8060;font-size:.78em;margin-top:4px}
.card .line{margin:6px 0;font-size:1em;line-height:2}
.card .line input{border:none;border-bottom:2px dashed #c4a87a;background:transparent;font-size:1em;font-family:inherit;color:#3a2e1f;width:130px;padding:2px 4px;outline:none;transition:border-color .3s}
.card .line input:focus{border-color:#8b5e3c}
.card .line input.correct-input{border-color:#6abf69;color:#2d7d2d;background:#eef8ee;border-bottom-style:solid}
.card .line input.wrong-input{border-color:#e06050;color:#c03020;background:#fef0ee;border-bottom-style:solid}
.card .answer-reveal{color:#2d7d2d;font-size:.85em;margin-top:4px;display:none}
.btn-row{text-align:center;margin:20px 0}
.btn{display:inline-block;padding:10px 26px;border-radius:8px;font-size:.95em;cursor:pointer;border:none;font-family:inherit;transition:all .2s;margin:0 5px}
.btn-primary{background:linear-gradient(135deg,#8b5e3c,#a67c52);color:#fff;box-shadow:0 3px 10px rgba(100,60,30,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(100,60,30,.3)}
.btn-secondary{background:#e8ddd0;color:#6b3a2a}
.btn-secondary:hover{background:#ddd0c0}
.btn-danger{background:#e06050;color:#fff}
.result-panel{background:#fffef9;border-radius:12px;padding:22px;margin:15px 0;box-shadow:0 2px 10px rgba(100,70,40,.08);border:1px solid #e8ddd0;text-align:center;display:none}
.result-panel .big-score{font-size:2.8em;color:#8b3a2a;font-weight:bold}
.result-panel .label{color:#9a8060;font-size:.85em;margin-top:4px}
.result-panel .detail{margin-top:12px;font-size:.88em;color:#6b5a48;line-height:1.8}
.empty-msg{text-align:center;color:#9a8060;padding:40px 0;font-size:1em}
.day-info{text-align:center;color:#9a8060;font-size:.85em;margin-bottom:12px}
.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:15px;font-size:.85em;color:#8a7560}
.stats-row span{background:#fffef9;padding:4px 12px;border-radius:12px;border:1px solid #e8ddd0}
/* 拼音标注样式 */
.pinyin-char{position:relative;display:inline-block;margin:0 1px}
.pinyin{position:absolute;top:-1.2em;left:0;font-size:0.6em;color:#9a8060;width:100%;text-align:center;white-space:nowrap}
/* 按钮样式 */
.action-buttons{display:flex;gap:8px;margin-top:8px}
.btn-skip{padding:4px 12px;font-size:0.8em;background:#ffd166;color:#8a5a00;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-skip:hover{background:#ffc745}
.btn-mastered{padding:4px 12px;font-size:0.8em;background:#06d6a0;color:#005f45;border:none;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-mastered:hover{background:#05c592}
.btn-skip:disabled,.btn-mastered:disabled{opacity:0.5;cursor:not-allowed}
</style>
</head>

<body>
<div class="container">
  <h1>古诗文默写系统</h1>
  <div class="subtitle">八年级(下) · 智能版</div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('daily')">📅 每日练习</div>
    <div class="tab" onclick="switchTab('wrong')">📝 错题复习 <span class="badge" id="wrongBadge" style="display:none">0</span></div>
    <div class="tab" onclick="switchTab('mastered')">✅ 已掌握</div>
    <div class="tab" onclick="switchTab('skipped')">⏭️ 跳过题</div>
  </div>
  
  <div class="day-info" id="dayInfo"></div>
  
  <div class="stats-row">
    <span id="statTotalQuestions">总题数 151</span>
    <span id="statDone">已做 0 题</span>
    <span id="statMastered">✅ 已掌握 0 题</span>
    <span id="statSkipped">⏭️ 跳过 0 题</span>
    <span id="statCorrect">正确率 --</span>
    <span id="statStreak">🔥 连续 0 天</span>
  </div>
  
  <!-- 每日练习区域 -->
  <div id="dailyTab">
    <div class="score-bar">
      <span id="answeredCount">已答 0/0</span>
      <span id="timerDisplay">⏱ 00:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    
    <div id="quizArea"></div>
    
    <div class="btn-row" id="dailyBtns">
      <button class="btn btn-primary" onclick="submitAll('daily')">📤 提交答案</button>
      <button class="btn btn-secondary" onclick="redoDaily()">🔄 重新练习</button>
    </div>
    
    <div class="result-panel" id="dailyResult">
      <div class="big-score" id="dailyScore">100</div>
      <div class="label">今日得分</div>
      <div class="detail" id="dailyDetail"></div>
    </div>
  </div>
  
  <!-- 错题复习区域 -->
  <div id="wrongTab" style="display:none">
    <div id="wrongArea"></div>
    <div class="btn-row" id="wrongBtns">
      <button class="btn btn-primary" onclick="submitAll('wrong')">📤 提交答案</button>
      <button class="btn btn-danger" onclick="clearWrong()">🗑️ 清空错题</button>
    </div>
    <div class="result-panel" id="wrongResult">
      <div class="big-score" id="wrongScore">100</div>
      <div class="label">错题练习得分</div>
      <div class="detail" id="wrongDetail"></div>
    </div>
  </div>
  
  <!-- 已掌握题目区域 -->
  <div id="masteredTab" style="display:none">
    <div id="masteredArea"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="reviewMastered()">🔄 复习已掌握</button>
      <button class="btn btn-danger" onclick="clearMastered()">🗑️ 清空已掌握</button>
    </div>
  </div>
  
  <!-- 跳过题目区域 -->
  <div id="skippedTab" style="display:none">
    <div id="skippedArea"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="trySkipped()">📝 尝试跳过题</button>
      <button class="btn btn-danger" onclick="clearSkipped()">🗑️ 清空跳过题</button>
    </div>
  </div>
</div>

<script>
// ====== 题库数据 ======
const ALL_QUESTIONS = [
  // 1-10题：陶渊明《桃花源记》
  {id:1,lines:["____，芳草鲜美。"],sources:["陶渊明《桃花源记》"],answers:["忽逢桃花林"],bc:1},
  {id:2,lines:["____，落英缤纷。"],sources:["陶渊明《桃花源记》"],answers:["芳草鲜美"],bc:1},
  {id:3,lines:["____，欲穷其林。"],sources:["陶渊明《桃花源记》"],answers:["渔人甚异之"],bc:1},
  {id:4,lines:["____，仿佛若有光。"],sources:["陶渊明《桃花源记》"],answers:["初极狭"],bc:1},
  {id:5,lines:["____，豁然开朗。"],sources:["陶渊明《桃花源记》"],answers:["复行数十步"],bc:1},
  {id:6,lines:["____，屋舍俨然。"],sources:["陶渊明《桃花源记》"],answers:["土地平旷"],bc:1},
  {id:7,lines:["____，鸡犬相闻。"],sources:["陶渊明《桃花源记》"],answers:["阡陌交通"],bc:1},
  {id:8,lines:["____，并怡然自乐。"],sources:["陶渊明《桃花源记》"],answers:["黄发垂髫"],bc:1},
  {id:9,lines:["____，咸来问讯。"],sources:["陶渊明《桃花源记》"],answers:["村中闻有此人"],bc:1},
  {id:10,lines:["____，皆出酒食。"],sources:["陶渊明《桃花源记》"],answers:["余人各复延至其家"],bc:1},
  
  // 11-20题：柳宗元《小石潭记》
  {id:11,lines:["____，闻水声。"],sources:["柳宗元《小石潭记》"],answers:["从小丘西行百二十步"],bc:1},
  {id:12,lines:["____，心乐之。"],sources:["柳宗元《小石潭记》"],answers:["如鸣珮环"],bc:1},
  {id:13,lines:["____，下见小潭。"],sources:["柳宗元《小石潭记》"],answers:["伐竹取道"],bc:1},
  {id:14,lines:["____，水尤清冽。"],sources:["柳宗元《小石潭记》"],answers:["全石以为底"],bc:1},
  {id:15,lines:["____，为坻，为屿，为嵁，为岩。"],sources:["柳宗元《小石潭记》"],answers:["近岸"],bc:1},
  {id:16,lines:["____，蒙络摇缀。"],sources:["柳宗元《小石潭记》"],answers:["青树翠蔓"],bc:1},
  {id:17,lines:["____，参差披拂。"],sources:["柳宗元《小石潭记》"],answers:["蒙络摇缀"],bc:1},
  {id:18,lines:["____，皆若空游无所依。"],sources:["柳宗元《小石潭记》"],answers:["潭中鱼可百许头"],bc:1},
  {id:19,lines:["____，影布石上。"],sources:["柳宗元《小石潭记》"],answers:["日光下澈"],bc:1},
  {id:20,lines:["____，俶尔远逝。"],sources:["柳宗元《小石潭记》"],answers:["佁然不动"],bc:1},
  
  // 21-30题：补充柳宗元《小石潭记》
  {id:21,lines:["____，往来翕忽。"],sources:["柳宗元《小石潭记》"],answers:["俶尔远逝"],bc:1},
  {id:22,lines:["____，似与游者相乐。"],sources:["柳宗元《小石潭记》"],answers:["往来翕忽"],bc:1},
  {id:23,lines:["____，斗折蛇行。"],sources:["柳宗元《小石潭记》"],answers:["潭西南而望"],bc:1},
  {id:24,lines:["____，明灭可见。"],sources:["柳宗元《小石潭记》"],answers:["斗折蛇行"],bc:1},
  {id:25,lines:["____，不可知其源。"],sources:["柳宗元《小石潭记》"],answers:["其岸势犬牙差互"],bc:1},
  {id:26,lines:["____，悄怆幽邃。"],sources:["柳宗元《小石潭记》"],answers:["凄神寒骨"],bc:1},
  {id:27,lines:["____，不可久居。"],sources:["柳宗元《小石潭记》"],answers:["以其境过清"],bc:1},
  {id:28,lines:["____，乃记之而去。"],sources:["柳宗元《小石潭记》"],answers:["不可久居"],bc:1},
  {id:29,lines:["____，崔氏二小生。"],sources:["柳宗元《小石潭记》"],answers:["同游者"],bc:1},
  {id:30,lines:["____，曰恕己，曰奉壹。"],sources:["柳宗元《小石潭记》"],answers:["崔氏二小生"],bc:1}
];

// ====== 拼音标注库 ======
const PINYIN_MAP = {
  "忽":"hū","逢":"féng","桃":"táo","花":"huā","林":"lín",
  "芳":"fāng","草":"cǎo","鲜":"xiān","美":"měi",
  "落":"luò","英":"yīng","缤":"bīn","纷":"fēn",
  "渔":"yú","人":"rén","甚":"shèn","异":"yì","之":"zhī",
  "初":"chū","极":"jí","狭":"xiá","仿":"fǎng","佛":"fú",
  "复":"fù","行":"xíng","数":"shù","十":"shí","步":"bù",
  "土":"tǔ","地":"dì","平":"píng","旷":"kuàng","屋":"wū","舍":"shè","俨":"yǎn","然":"rán",
  "阡":"qiān","陌":"mò","交":"jiāo","通":"tōng","鸡":"jī","犬":"quǎn","相":"xiāng","闻":"wén",
  "黄":"huáng","发":"fà","垂":"chuí","髫":"tiáo","并":"bìng","怡":"yí","自":"zì","乐":"lè",
  "村":"cūn","中":"zhōng","闻":"wén","有":"yǒu","此":"cǐ","人":"rén","咸":"xián","来":"lái","问":"wèn","讯":"xùn",
  "余":"yú","人":"rén","各":"gè","复":"fù","延":"yán","至":"zhì","其":"qí","家":"jiā","皆":"jiē","出":"chū","酒":"jiǔ","食":"shí"
};

// ====== 本地存储管理 ======
function getStorage(key, defaultValue = []) {
  try {
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : defaultValue;
  } catch {
    return defaultValue;
  }
}

function setStorage(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

// ====== 拼音标注函数 ======
function addPinyin(text) {
  let result = '';
  for (let char of text) {
    if (PINYIN_MAP[char]) {
      result += `<span class="pinyin-char">${char}<span class="pinyin">${PINYIN_MAP[char]}</span></span>`;
    } else {
      result += char;
    }
  }
  return result;
}

// ====== 状态管理 ======
let currentTab = 'daily';
let dailyQuestions = [];
let wrongQuestions = getStorage('wrongQuestions', []);
let masteredQuestions = getStorage('masteredQuestions', []);
let skippedQuestions = getStorage('skippedQuestions', []);
let answeredCount = 0;
let startTime = Date.now();

// ====== 初始化 ======
function init() {
  updateStats();
  generateDailyQuestions();
  updateDayInfo();
  startTimer();
  renderQuestions();
}

// ====== 生成每日题目 ======
function generateDailyQuestions() {
  const allIds = ALL_QUESTIONS.map(q => q.id);
  const masteredIds = masteredQuestions;
  const skippedIds = skippedQuestions;
  
  // 排除已掌握和跳过的题目
  const availableIds = allIds.filter(id => 
    !masteredIds.includes(id) && !skippedIds.includes(id)
  );
  
  // 添加最多3道错题
  const wrongIds = wrongQuestions.slice(0, 3);
  const dailyIds = [...wrongIds];
  
  // 补充其他题目到5道
  const remainingIds = availableIds.filter(id => !dailyIds.includes(id));
  const needed = Math.max(0, 5 - dailyIds.length);
  const randomIds = shuffleArray(remainingIds).slice(0, needed);
  
  dailyQuestions = [...dailyIds, ...randomIds];
  answeredCount = 0;
  updateProgress();
}

// ====== 渲染题目 ======
function renderQuestions() {
  const area = document.getElementById('quizArea');
  if (!area) return;
  
  area.innerHTML = '';
  
  if (dailyQuestions.length === 0) {
    area.innerHTML = '<div class="empty-msg">🎉 今日已完成所有练习！</div>';
    return;
  }
  
  dailyQuestions.forEach((qId, index) => {
    const question = ALL_QUESTIONS.find(q => q.id === qId);
    if (!question) return;
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div>
        <span class="q-num">${index + 1}</span>
        <span class="source">${question.sources.join('、')}</span>
      </div>
      ${question.lines.map(line => `
        <div class="line">${line.replace('____', '<input type="text" id="input-${qId}" placeholder="填写答案">')}</div>
      `).join('')}
      <div class="answer-reveal" id="answer-${qId}"></div>
      <div class="action-buttons">
        <button class="btn-skip" onclick="skipQuestion(${qId})" ${skippedQuestions.includes(qId) ? 'disabled' : ''}>⏭️ 跳过</button>
        <button class="btn-mastered" onclick="markMastered(${qId})" ${masteredQuestions.includes(qId) ? 'disabled' : ''}>✅ 已掌握</button>
      </div>
    `;
    area.appendChild(card);
  });
}

// ====== 提交答案 ======
function submitAll(type) {
  let score = 0;
  let total = 0;
  const wrongIds = [];
  
  dailyQuestions.forEach(qId => {
    const question = ALL_QUESTIONS.find(q => q.id === qId);
    if (!question) return;
    
    const input = document.getElementById(`input-${qId}`);
    const answerDiv = document.getElementById(`answer-${qId}`);
    
    if (input && answerDiv) {
      const userAnswer = input.value.trim();
      const correctAnswer = question.answers[0];
      
      if (userAnswer === correctAnswer) {
        input.className = 'correct-input';
        answerDiv.innerHTML = `✅ 正确：${addPinyin(correctAnswer)}`;
        answerDiv.style.display = 'block';
        score++;
      } else {
        input.className = 'wrong-input';
        answerDiv.innerHTML = `❌ 正确答案：${addPinyin(correctAnswer)}`;
        answerDiv.style.display = 'block';
        wrongIds.push(qId);
      }
      
      total++;
    }
  });
  
  // 更新错题
  wrongIds.forEach(id => {
    if (!wrongQuestions.includes(id)) {
      wrongQuestions.push(id);
    }
  });
  setStorage('wrongQuestions', wrongQuestions);
  
  // 显示结果
  const resultDiv = document.getElementById(`${type}Result`);
  const scoreDiv = document.getElementById(`${type}Score`);
  const detailDiv = document.getElementById(`${type}Detail`);
  
  if (resultDiv && scoreDiv && detailDiv) {
    const percent = total > 0 ? Math.round((score / total) * 100) : 0;
    scoreDiv.textContent = percent;
    detailDiv.innerHTML = `答对 ${score} 题，共 ${total} 题<br>错题已自动加入错题复习`;
    resultDiv.style.display = 'block';
  }
  
  updateStats();
}

// ====== 跳过题目 ======
function skipQuestion(qId) {
  if (!skippedQuestions.includes(qId)) {
    skippedQuestions.push(qId);
    setStorage('skippedQuestions', skippedQuestions);
    updateStats();
    renderQuestions();
  }
}

// ====== 标记已掌握 ======
function markMastered(qId) {
  if (!masteredQuestions.includes(qId)) {
    masteredQuestions.push(qId);
    setStorage('masteredQuestions', masteredQuestions);
    updateStats();
    renderQuestions();
  }
}

// ====== 更新统计 ======
function updateStats() {
  const total = ALL_QUESTIONS.length;
  const done = masteredQuestions.length + wrongQuestions.length + skippedQuestions.length;
  const mastered = masteredQuestions.length;
  const skipped = skippedQuestions.length;
  const correctRate = done > 0 ? Math.round((mastered / done) * 100) : 0;
  
  document.getElementById('statTotalQuestions').textContent = `总题数 ${total}`;
  document.getElementById('statDone').textContent = `已做 ${done} 题`;
  document.getElementById('statMastered').textContent = `✅ 已掌握 ${mastered} 题`;
  document.getElementById('statSkipped').textContent = `⏭️ 跳过 ${skipped} 题`;
  document.getElementById('statCorrect').textContent = `正确率 ${correctRate}%`;
  
  // 更新错题徽章
  const wrongBadge = document.getElementById('wrongBadge');
  if (wrongBadge) {
    if (wrongQuestions.length > 0) {
      wrongBadge.textContent = wrongQuestions.length;
      wrongBadge.style.display = 'inline-block';
    } else {
      wrongBadge.style.display = 'none';
    }
  }
}

// ====== 更新进度 ======
function updateProgress() {
  const progress = dailyQuestions.length > 0 ? Math.round((answeredCount / dailyQuestions.length) * 100) : 0;
  document.getElementById('progressFill').style.width = `${progress}%`;
  document.getElementById('answeredCount').textContent = `已答 ${answeredCount}/${dailyQuestions.length}`;
}

// ====== 切换标签页 ======
function switchTab(tab) {
  currentTab = tab;
  
  // 更新标签样式
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tab === 'daily' ? '每日练习' : 
                               tab === 'wrong' ? '错题复习' :
                               tab === 'mastered' ? '已掌握' : '跳过题')) {
      t.classList.add('active');
    }
  });
  
  // 显示对应区域
  document.getElementById('dailyTab').style.display = tab === 'daily' ? 'block' : 'none';
  document.getElementById('wrongTab').style.display = tab === 'wrong' ? 'block' : 'none';
  document.getElementById('masteredTab').style.display = tab === 'mastered' ? 'block' : 'none';
  document.getElementById('skippedTab').style.display = tab === 'skipped' ? 'block' : 'none';
  
  // 加载对应内容
  if (tab === 'wrong') loadWrongQuestions();
  if (tab === 'mastered') loadMasteredQuestions();
  if (tab === 'skipped') loadSkippedQuestions();
}

// ====== 加载错题 ======
function loadWrongQuestions() {
  const area = document.getElementById('wrongArea');
  if (!area) return;
  
  area.innerHTML = '';
  
  if (wrongQuestions.length === 0) {
    area.innerHTML = '<div class="empty-msg">🎉 没有错题需要复习！</div>';
    return;
  }
  
  wrongQuestions.forEach((qId, index) => {
    const question = ALL_QUESTIONS.find(q => q.id === qId);
    if (!question) return;
    
    const card = document.createElement('div');
    card.className = 'card wrong';
    card.innerHTML = `
      <div>
        <span class="q-num">${index + 1}</span>
        <span class="source">${question.sources.join('、')}</span>
      </div>
      ${question.lines.map(line => `
        <div class="line">${line.replace('____', '<input type="text" id="wrong-input-${qId}" placeholder="填写答案">')}</div>
      `).join('')}
      <div class="answer-reveal" id="wrong-answer-${qId}"></div>
    `;
    area.appendChild(card);
  });
}

// ====== 工具函数 ======
function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function updateDayInfo() {
  const now = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('dayInfo').textContent = now.toLocaleDateString('zh-CN', options);
}

function startTimer() {
  setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const seconds = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('timerDisplay').textContent = `⏱ ${minutes}:${seconds}`;
  }, 1000);
}
